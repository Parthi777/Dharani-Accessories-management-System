<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dharani Accessories Management System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.0/dist/chartjs-chart-treemap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef2f8; --panel:rgba(255,255,255,.62); --panel2:rgba(255,255,255,.40); --line:rgba(15,23,42,.08);
    --txt:#0f172a; --muted:#5b6472; --brand:#2563eb; --brand2:#1d4ed8;
    --brand-soft:rgba(37,99,235,.12); --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --radius:18px;
    --glass:rgba(255,255,255,.6); --glass-strong:rgba(255,255,255,.8); --glass-border:rgba(255,255,255,.7);
    --shadow:0 8px 30px rgba(31,38,135,.12); --shadow-lg:0 18px 50px rgba(31,38,135,.22);
    --blur:saturate(170%) blur(16px);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased;
    min-height:100vh;background-attachment:fixed;
    background:
      radial-gradient(900px 620px at 10% -12%, rgba(99,102,241,.22), transparent 60%),
      radial-gradient(820px 600px at 112% 8%, rgba(16,185,129,.18), transparent 55%),
      radial-gradient(760px 720px at 50% 120%, rgba(37,99,235,.18), transparent 55%),
      linear-gradient(135deg,#eef2ff 0%,#f6f8fc 45%,#eefcf7 100%);}
  a{color:var(--brand)}
  button{font:inherit;cursor:pointer;border:none;border-radius:12px;padding:9px 16px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-weight:600;transition:.18s;box-shadow:0 6px 16px rgba(37,99,235,.28)}
  button:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(37,99,235,.34)}
  button.ghost{background:var(--glass);color:#1f2937;border:1px solid var(--glass-border);box-shadow:none;-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)} button.ghost:hover{background:rgba(255,255,255,.85)}
  button.sm{padding:6px 12px;font-size:12px;border-radius:10px} button.danger{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 6px 16px rgba(220,38,38,.28)} button.ok{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 6px 16px rgba(22,163,74,.26)}
  input,select,textarea{font:inherit;background:rgba(255,255,255,.6);color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:10px 12px;width:100%;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:.15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.18);background:rgba(255,255,255,.88)}
  input:disabled,select:disabled{background:rgba(241,243,246,.7);color:#9ca3af;cursor:not-allowed}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:500}
  .field{margin-bottom:12px}
  .row{display:flex;gap:12px;flex-wrap:wrap} .row>*{flex:1;min-width:140px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;position:sticky;top:0;background:rgba(248,250,252,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);text-transform:uppercase;font-size:11px;letter-spacing:.04em}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(37,99,235,.06)}
  .tableWrap{overflow:auto;max-height:60vh;border:1px solid var(--glass-border);border-radius:var(--radius);background:var(--panel);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);box-shadow:var(--shadow)}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .pill.green{background:#dcfce7;color:#15803d} .pill.red{background:#fee2e2;color:#b91c1c}
  .pill.amber{background:#fef3c7;color:#b45309} .pill.gray{background:#eef0f3;color:#475569}
  .right{text-align:right} .center{text-align:center} .muted{color:var(--muted)}
  .hidden{display:none!important}

  /* Login */
  #login{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
  .card{background:var(--panel);border:1px solid var(--glass-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  #login .card{width:100%;max-width:380px;background:var(--glass-strong);box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,.75)}
  #hamburger{display:none;background:transparent;color:var(--txt);border:none;box-shadow:none;font-size:20px;line-height:1;padding:6px 8px;cursor:pointer}
  #hamburger:hover{transform:none;box-shadow:none}
  #navBackdrop{display:none}
  .logo{font-size:21px;font-weight:800;letter-spacing:-.2px}
  .logo span{color:var(--brand)}

  /* App shell */
  #app{display:none;min-height:100vh;grid-template-columns:240px 1fr;grid-template-rows:60px 1fr}
  #topbar{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;background:rgba(255,255,255,.55);border-bottom:1px solid var(--glass-border);
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);position:sticky;top:0;z-index:40}
  #side{background:rgba(255,255,255,.45);border-right:1px solid var(--glass-border);padding:16px 12px;overflow:auto;
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  #main{padding:26px;overflow:auto;height:calc(100vh - 60px);background:transparent}
  .nav a{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;color:#374151;
    text-decoration:none;margin-bottom:4px;font-weight:500;transition:.15s}
  .nav a:hover{background:rgba(255,255,255,.7)} .nav a.active{background:linear-gradient(135deg,rgba(37,99,235,.16),rgba(37,99,235,.05));color:#1d4ed8;font-weight:600;box-shadow:inset 3px 0 0 var(--brand),0 4px 12px rgba(37,99,235,.12)}
  .nav a.active .ico{color:var(--brand)}
  .nav .ico{width:18px;text-align:center}
  .who{font-size:12px;text-align:right;line-height:1.3}

  /* KPI grid */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:.2s;box-shadow:var(--shadow);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,#2563eb,#22d3ee)}
  .kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(37,99,235,.4)}
  .kpi .v{font-size:26px;font-weight:800;margin-top:6px;color:var(--txt);letter-spacing:-.5px} .kpi .l{font-size:12px;color:var(--muted);font-weight:500}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  .panel h3{margin:0 0 14px;font-size:14px;font-weight:600}
  h1{font-size:23px;margin:0 0 4px;font-weight:800;letter-spacing:-.4px} .sub{color:var(--muted);margin:0 0 18px;font-size:13px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade .2s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--glass-strong);border:1px solid rgba(255,255,255,.75);border-radius:var(--radius);padding:24px;max-width:90vw;max-height:88vh;overflow:auto;min-width:340px;box-shadow:var(--shadow-lg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  .modal h3{margin:0 0 14px}
  .modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  /* Toast */
  #toast{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--glass-strong);border:1px solid var(--glass-border);border-left:4px solid var(--brand);
    padding:12px 16px;border-radius:12px;min-width:240px;box-shadow:var(--shadow-lg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);animation:slide .2s}
  .toast.ok{border-left-color:var(--green)} .toast.err{border-left-color:var(--red)}
  @keyframes slide{from{transform:translateX(20px);opacity:0}}
  .filters{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
  .filters .field{margin:0;min-width:150px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .saleGrid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,340px);gap:16px;align-items:start}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .tabs button{background:var(--glass);color:#374151;border:1px solid var(--glass-border);box-shadow:none;-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)} .tabs button.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(37,99,235,.28)}
  .brand-title{font-weight:800;font-size:15px;letter-spacing:-.2px;color:var(--txt);line-height:1.1}
  .brand-tag{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
  .userbox{display:flex;align-items:center;gap:10px}
  .userbox .who{text-align:right;font-size:12px;line-height:1.25}
  .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;display:inline-flex;
    align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto;box-shadow:0 4px 12px rgba(37,99,235,.3)}
  @media(max-width:860px){
    #app{grid-template-columns:1fr}
    #hamburger{display:inline-flex;align-items:center}
    /* sidebar becomes a slide-in drawer */
    #side{position:fixed;top:60px;left:0;bottom:0;width:240px;z-index:60;
      transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    body.navopen #side{transform:translateX(0)}
    #navBackdrop{display:block;position:fixed;inset:60px 0 0 0;background:rgba(15,23,42,.45);z-index:55;
      opacity:0;pointer-events:none;transition:opacity .22s}
    body.navopen #navBackdrop{opacity:1;pointer-events:auto}
    .panels{grid-template-columns:1fr} .saleGrid{grid-template-columns:1fr}
    .userbox .who{display:none}
    .brand{min-width:0}
    .brand-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-tag{display:none}
    #topbar{padding:0 10px} #main{padding:14px}
    h1{font-size:19px}
    .kpis{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .kpi .v{font-size:21px}
    .modal{min-width:auto;width:calc(100vw - 28px)}
    th,td{padding:8px 9px}
    .filters .field{min-width:130px}
    .chartGrid{grid-template-columns:1fr!important}
  }

  /* KPI color status (overrides the default top accent) */
  .kpi.green::before{background:linear-gradient(90deg,#16a34a,#4ade80)}
  .kpi.amber::before{background:linear-gradient(90deg,#d97706,#fbbf24)}
  .kpi.red::before{background:linear-gradient(90deg,#dc2626,#f87171)}
  .kpi.green .v{color:#15803d} .kpi.amber .v{color:#b45309} .kpi.red .v{color:#b91c1c}
  .kpi .ico{position:absolute;top:14px;right:16px;font-size:18px;opacity:.5}
  .kpis.secondary{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .kpis.secondary .kpi{padding:12px 16px;cursor:default} .kpis.secondary .kpi .v{font-size:18px}
  .kpis.secondary .kpi::before{display:none}

  /* Charts grid */
  .chartGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .chartGrid .panel{margin-bottom:0}
  .panel.span2{grid-column:1 / -1}
  .chartHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .chartHead h3{margin:0}
  .toggle{display:inline-flex;gap:4px}
  .toggle button{padding:4px 10px;font-size:11px;border-radius:8px;background:var(--glass);color:#475569;border:1px solid var(--glass-border);box-shadow:none}
  .toggle button.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-color:transparent}
  .chartWrap{position:relative;height:240px} .chartWrap.tall{height:300px}

  /* Live alerts strip */
  .alerts{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .alert{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:14px;cursor:pointer;font-size:13px;font-weight:600;
    border:1px solid var(--glass-border);background:var(--panel);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);box-shadow:var(--shadow);transition:.15s}
  .alert:hover{transform:translateY(-2px)}
  .alert .n{font-size:18px;font-weight:800}
  .alert.red{border-left:4px solid var(--red)} .alert.red .n{color:var(--red)}
  .alert.amber{border-left:4px solid var(--amber)} .alert.amber .n{color:var(--amber)}
  .alert.blue{border-left:4px solid var(--brand)} .alert.blue .n{color:var(--brand)}
  .alert.green{border-left:4px solid var(--green)} .alert.green .n{color:var(--green)}

  /* Quick actions */
  .quick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .quick button{background:var(--glass-strong);color:#1d4ed8;border:1px solid var(--glass-border);box-shadow:var(--shadow);font-weight:600}
  .quick button:hover{background:#fff}

  /* Export dropdown (native details/summary) */
  .exp{position:relative;display:inline-block}
  .exp>summary{list-style:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;font-size:12px;font-weight:600;border-radius:10px;
    background:var(--glass);color:#1f2937;border:1px solid var(--glass-border)}
  .exp>summary::-webkit-details-marker{display:none}
  .exp[open]>summary{background:rgba(255,255,255,.9)}
  .exp-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:30;min-width:140px;padding:6px;border-radius:12px;
    background:var(--glass-strong);border:1px solid var(--glass-border);box-shadow:var(--shadow-lg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur)}
  .exp-menu button{display:block;width:100%;text-align:left;background:transparent;color:#1f2937;box-shadow:none;padding:8px 10px;border-radius:8px;font-weight:500}
  .exp-menu button:hover{background:rgba(37,99,235,.1);transform:none;box-shadow:none}
  .barRow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- ───────── LOGIN ───────── -->
<div id="login">
  <div class="card">
    <div class="logo" style="font-size:19px;line-height:1.2;margin-bottom:4px">Dharani Accessories Management System</div>
    <div class="muted" style="margin-bottom:18px">Manage Smarter. Grow Faster</div>
    <form id="loginForm">
      <div class="field"><label>Email</label><input id="liEmail" type="email" autocomplete="username" placeholder="you@example.com" required></div>
      <div class="field"><label>Password</label><input id="liPwd" type="password" autocomplete="current-password" required></div>
      <button style="width:100%" type="submit">Sign in</button>
      <div id="liErr" class="muted center" style="margin-top:12px;color:var(--red)"></div>
    </form>
  </div>
</div>

<!-- ───────── APP ───────── -->
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <button id="hamburger" onclick="toggleNav()" aria-label="Menu">☰</button>
      <div class="brand" style="min-width:0">
        <div class="brand-title">Dharani Accessories Management System</div>
        <div class="brand-tag">Manage Smarter. Grow Faster <span id="branchLabel"></span></div>
      </div>
    </div>
    <div class="userbox">
      <div class="avatar" id="whoAvatar"></div>
      <div class="who"><div id="whoName" style="font-weight:600;color:var(--txt)"></div><div class="muted" id="whoRole"></div></div>
      <button class="danger sm" onclick="logout()" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div id="side">
    <nav class="nav" id="nav"></nav>
  </div>
  <div id="navBackdrop" onclick="closeNav()"></div>
  <div id="main"></div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════ Core ════════════════════ */
const API = '/api';
const COMPANY = 'Bhavani Dharani TVS';   // fallback name on PDF invoices
let CONFIG = { company: COMPANY, currency: 'INR', gstRate: 0, gstMode: 'exclusive', gstEnabled: true, gstin: '', categories: [], suppliers: [] };
let TOKEN = localStorage.getItem('dams_token') || '';
let USER = null;
try { USER = JSON.parse(localStorage.getItem('dams_user') || 'null'); } catch {}
let VPMAP = {};        // vehicle -> [partName]
let BRANCHES = [];     // active branches
const $ = s => document.querySelector(s);
const el = (t, p={}) => Object.assign(document.createElement(t), p);

/* Modern Chart.js look-and-feel (applied once, globally) */
if (window.Chart) {
  Chart.defaults.font.family = "'Inter',system-ui,-apple-system,sans-serif";
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#5b6472';
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.boxWidth = 8;
  Chart.defaults.plugins.legend.labels.padding = 14;
  const tt = Chart.defaults.plugins.tooltip;
  tt.backgroundColor = 'rgba(15,23,42,.92)'; tt.padding = 12; tt.cornerRadius = 10;
  tt.titleFont = { weight: '600', size: 12 }; tt.bodyFont = { size: 12 };
  tt.boxPadding = 6; tt.usePointStyle = true;
  Chart.defaults.animation = { duration: 700, easing: 'easeOutQuart' };
  // Charts live in fixed-height .chartWrap containers — fill them.
  Chart.defaults.responsive = true;
  Chart.defaults.maintainAspectRatio = false;
}

function apiCall(method, path, body){
  return fetch(API + path, {
    method,
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + (TOKEN||'') },
    body: body ? JSON.stringify(body) : undefined
  }).then(async r => {
    const j = await r.json().catch(()=>({ok:false,msg:'Bad response'}));
    if (r.status === 401) { doLogout(); }
    return j;
  });
}
const fmtINR = n => '₹' + Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN') : '';
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(msg, kind='ok'){
  const t = el('div',{className:'toast '+kind,textContent:msg});
  $('#toast').appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

/* ════════════════════ Auth ════════════════════ */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  $('#liErr').textContent='';
  const r = await apiCall('POST','/auth/login',{ email:$('#liEmail').value.trim(), password:$('#liPwd').value });
  if(!r.ok){ $('#liErr').textContent = r.msg||'Login failed'; return; }
  TOKEN = r.token; USER = r.user;
  localStorage.setItem('dams_token',TOKEN); localStorage.setItem('dams_user',JSON.stringify(USER));
  await boot();
});
function toggleNav(){ document.body.classList.toggle('navopen'); }
function closeNav(){ document.body.classList.remove('navopen'); }
function logout(){ apiCall('POST','/auth/logout').finally(doLogout); }
function doLogout(){
  TOKEN=''; USER=null;
  localStorage.removeItem('dams_token'); localStorage.removeItem('dams_user');
  $('#app').style.display='none'; $('#login').style.display='flex';
}

/* ════════════════════ Permissions ════════════════════ */
const NAV = [
  { id:'dashboard', label:'Dashboard', ico:'▣', roles:['Admin','Branch_Manager','Sales_Staff','Store_Staff','Accountant'] },
  { id:'sales',     label:'New Sale',  ico:'🛒', roles:['Admin','Branch_Manager','Sales_Staff'] },
  { id:'saleslist', label:'Sales',     ico:'≣',  roles:['Admin','Branch_Manager','Sales_Staff','Accountant'] },
  { id:'stock',     label:'Stock',     ico:'▦',  roles:['Admin','Branch_Manager','Sales_Staff','Store_Staff','Accountant'] },
  { id:'inward',    label:'Inward',    ico:'▼',  roles:['Admin','Branch_Manager','Store_Staff'] },
  { id:'bulk',      label:'Bulk Inward',ico:'⇪', roles:['Admin','Branch_Manager','Store_Staff'] },
  { id:'transfer',  label:'Stock Transfer',ico:'⇄', roles:['Admin','Branch_Manager','Store_Staff'] },
  { id:'analytics', label:'Analytics', ico:'◔',  roles:['Admin','Branch_Manager','Accountant'] },
  { id:'suppliers', label:'Suppliers', ico:'🏭', roles:['Admin'] },
  { id:'branches',  label:'Branches',  ico:'⌂',  roles:['Admin'] },
  { id:'users',     label:'Users',     ico:'⛁',  roles:['Admin'] },
  { id:'settings',  label:'Settings',  ico:'⚙',  roles:['Admin'] },
];
const can = id => { const n=NAV.find(x=>x.id===id); return n && n.roles.includes(USER.role); };

/* ════════════════════ Boot ════════════════════ */
async function boot(){
  $('#login').style.display='none'; $('#app').style.display='grid';
  $('#whoName').textContent = USER.name;
  $('#whoRole').textContent = USER.role.replace(/_/g,' ');
  $('#whoAvatar').textContent = (USER.name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  $('#logoutBtn').title = 'Sign out '+USER.name;
  $('#branchLabel').textContent = USER.branch && USER.branch!=='ALL' ? '· '+USER.branch : '· All branches';

  // nav
  const nav = $('#nav'); nav.innerHTML='';
  NAV.filter(n=>n.roles.includes(USER.role)).forEach(n=>{
    const a = el('a',{href:'#'+n.id}); a.dataset.id=n.id;
    a.innerHTML = `<span class="ico">${n.ico}</span><span>${n.label}</span>`;
    a.onclick = e=>{ e.preventDefault(); closeNav(); go(n.id); };
    nav.appendChild(a);
  });

  // shared data
  const [bm, vp, cf] = await Promise.all([ apiCall('GET','/branches'), apiCall('GET','/stock/vpmap'), apiCall('GET','/config') ]);
  BRANCHES = bm.ok ? bm.data : [];
  VPMAP = vp.ok ? vp.data : {};
  if(cf.ok) CONFIG = { ...CONFIG, ...cf.data };

  const start = (location.hash||'#dashboard').slice(1);
  go(can(start)?start:'dashboard');
}

function go(id){
  if(!can(id)) id='dashboard';
  location.hash = id;
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active', a.dataset.id===id));
  const views = { dashboard:viewDashboard, sales:viewSale, saleslist:viewSalesList, stock:viewStock,
    inward:viewInward, bulk:viewBulk, transfer:viewTransfer, analytics:viewAnalytics, suppliers:viewSuppliers, branches:viewBranches, users:viewUsers, settings:viewSettings };
  (views[id]||viewDashboard)();
}

/* Branch selector — admins choose; others are locked. */
function branchOptions(includeAll){
  const opts = (includeAll ? ['<option value="ALL">All branches</option>'] : []);
  for(const b of BRANCHES) opts.push(`<option value="${esc(b.name)}">${esc(b.name)}</option>`);
  return opts.join('');
}
function branchPicker(includeAll){
  if(USER.role!=='Admin' && USER.branch && USER.branch!=='ALL')
    return `<input value="${esc(USER.branch)}" disabled>`;
  return `<select id="fBranch">${branchOptions(includeAll)}</select>`;
}
const curBranch = () => { const s=$('#fBranch'); return s ? s.value : USER.branch; };

/* ════════════════════ Dashboard ════════════════════ */
let charts = {};
function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy()); charts={}; }
const fmtNum = v => Number(v||0).toLocaleString('en-IN');
const PALETTE=['#2563eb','#16a34a','#f59e0b','#ef4444','#7c3aed','#06b6d4','#ec4899','#0ea5e9','#84cc16','#f97316'];
let _dash=null, _gran='day', _topMetric='value';

// The 8 headline KPI cards. st() → '' (neutral) | green | amber | red.
const KPI_DEFS = [
  {k:'total_stock_items', l:'Total Stock Items', ico:'📦', f:fmtNum,  st:()=>''},

  {k:'today_sales',       l:"Today's Sales",     ico:'🛒', f:fmtINR,  st:v=>v>0?'green':'amber'},
  {k:'monthly_sales',     l:'Monthly Sales',     ico:'📈', f:fmtINR,  st:()=>''},
  {k:'total_invoices',    l:'Total Invoices',    ico:'🧾', f:fmtNum,  st:()=>''},

// Chart panels. role 'all' = everyone; 'multi' = hidden for Sales_Staff (personal view).
const CHART_PANELS=[

// ── Filters → query string ──────────────────────────────────────────────────
function dashFilters(){
  return { branch:curBranch()||'ALL', from:$('#fFrom')?.value||'', to:$('#fTo')?.value||'',
    category:$('#fCat')?.value||'ALL', supplier:$('#fSupp')?.value||'ALL' };
}
function dashQS(extra={}){
  const f={...dashFilters()};
  for(const [k,v] of Object.entries(extra)) if(v!=null && v!=='') f[k]=v;
  return '?'+Object.entries(f).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
}
function setDatePreset(p){
  const now=new Date(), iso=d=>d.toISOString().slice(0,10); let from, to=iso(now);
  if(p==='today') from=to;
  else if(p==='week'){ const d=new Date(now); d.setDate(d.getDate()-((d.getDay()+6)%7)); from=iso(d); }
  else if(p==='month') from=iso(new Date(now.getFullYear(),now.getMonth(),1));
  else if(p==='year') from=iso(new Date(now.getFullYear(),0,1));
  $('#fFrom').value=from; $('#fTo').value=to; loadDashboard();
}
function setGran(g,btn){ _gran=g; document.querySelectorAll('#granTog button').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); loadDashboard(); }
function setTopMetric(m,btn){ _topMetric=m; document.querySelectorAll('#topTog button').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); if(_dash) renderTopChart(); }
const granToggle=()=>`<span class="toggle" id="granTog">${[['day','Day'],['week','Week'],['month','Month'],['year','Year']].map(([g,l])=>`<button class="${g===_gran?'active':''}" onclick="setGran('${g}',this)">${l}</button>`).join('')}</span>`;
const topToggle=()=>`<span class="toggle" id="topTog">${[['value','₹ Value'],['qty','Qty']].map(([m,l])=>`<button class="${m===_topMetric?'active':''}" onclick="setTopMetric('${m}',this)">${l}</button>`).join('')}</span>`;

const isStaff=()=>USER.role==='Sales_Staff';
function optionList(arr,first){ return [`<option value="ALL">${first}</option>`].concat((arr||[]).map(x=>`<option value="${esc(x)}">${esc(x)}</option>`)).join(''); }

    </div>

    <div id="kpis" class="kpis"></div>

async function loadDashboard(){
  const r = await apiCall('GET','/dashboard'+dashQS({gran:_gran}));
  if(!r.ok) return toast(r.msg||'Failed to load','err');
  _dash=r.data;
  const { kpis, charts:ch, alerts, recent } = r.data;

  // KPI cards (8) with color status
  $('#kpis').innerHTML = KPI_DEFS.map(d=>{
    const cls=d.st(kpis[d.k],kpis)||'';
    return `<div class="kpi ${cls}" onclick="drill('${d.k}','${esc(d.l)}')">
      <span class="ico">${d.ico}</span><div class="l">${d.l}</div><div class="v">${d.f(kpis[d.k])}</div></div>`;
  }).join('');
  $('#kpis2').innerHTML = SECONDARY_KPIS.map(([k,l,f])=>`
    <div class="kpi" onclick="drill('${k}','${esc(l)}')"><div class="l">${l}</div><div class="v">${f(kpis[k])}</div></div>`).join('');

  if($('#alerts')) $('#alerts').innerHTML = renderAlerts(alerts);

  destroyCharts();
  const grid={color:'rgba(15,23,42,.06)'}, tick={color:'#94a3b8'};
  const noLeg={plugins:{legend:{display:false}}};
  const xy=axis=>({scales:{x:{grid:axis==='y'?grid:{display:false},ticks:tick,border:{display:false},beginAtZero:true},
    y:{grid:axis==='y'?{display:false}:grid,ticks:tick,border:{display:false},beginAtZero:true}}});

  // 1. Sales trend — gradient area line
  if($('#cTrend')){
    const ctx=$('#cTrend').getContext('2d'); const g=ctx.createLinearGradient(0,0,0,240);
    g.addColorStop(0,'rgba(37,99,235,.32)'); g.addColorStop(1,'rgba(37,99,235,0)');
    const labels=ch.trend.map(d=>_gran==='day'?fmtDate(d.label):d.label);
    charts.trend=new Chart($('#cTrend'),{type:'line',
      data:{labels,datasets:[{data:ch.trend.map(d=>d.value),borderColor:'#2563eb',backgroundColor:g,fill:true,tension:.4,borderWidth:2.5,pointRadius:0,pointHoverRadius:5}]},
      options:{...noLeg,interaction:{mode:'index',intersect:false},...xy('x'),
        onClick:(e,els)=>{ if(els.length) trendDrill(ch.trend[els[0].index].label); }}});
  }
  // 2. Branch-wise sales — horizontal bar → branch drill
  if($('#cBranch')) charts.branch=new Chart($('#cBranch'),{type:'bar',
    data:{labels:ch.byBranch.map(b=>b.branch),datasets:[{data:ch.byBranch.map(b=>b.value),backgroundColor:PALETTE,borderRadius:8,maxBarThickness:34}]},
    options:{indexAxis:'y',...noLeg,...xy('y'),onClick:(e,els)=>{ if(els.length) branchDrill(ch.byBranch[els[0].index].branch); }}});
  // 3. Monthly sales vs purchase — grouped bar → month drill
  if($('#cSVP')) charts.svp=new Chart($('#cSVP'),{type:'bar',
    data:{labels:ch.salesVsPurchase.map(m=>m.month),datasets:[
      {label:'Sales',data:ch.salesVsPurchase.map(m=>m.sales),backgroundColor:'#2563eb',borderRadius:6},
      {label:'Purchase',data:ch.salesVsPurchase.map(m=>m.purchase),backgroundColor:'#f59e0b',borderRadius:6},
      {label:'Profit',data:ch.salesVsPurchase.map(m=>m.profit),backgroundColor:'#16a34a',borderRadius:6}]},
    options:{plugins:{legend:{position:'top',labels:{color:'#475569'}}},...xy('x'),
      onClick:(e,els)=>{ if(els.length) chartDrill('month',ch.salesVsPurchase[els[0].index].month,'Sales · '+ch.salesVsPurchase[els[0].index].month); }}});
  // 4. Sales by category — doughnut → category drill
  if($('#cCat')) charts.cat=new Chart($('#cCat'),{type:'doughnut',
    data:{labels:ch.byCategory.map(c=>c.category),datasets:[{data:ch.byCategory.map(c=>c.value),backgroundColor:PALETTE,borderColor:'#fff',borderWidth:2,hoverOffset:8}]},
    options:{cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#475569'}}},
      onClick:(e,els)=>{ if(els.length) chartDrill('category',ch.byCategory[els[0].index].category,'Category · '+ch.byCategory[els[0].index].category); }}});
  // 5. Top 10 selling — horizontal bar (Qty/Value toggle) → part drill
  renderTopChart();
  // 6. Sales by supplier — doughnut → supplier sales drill
  if($('#cSupplier')) charts.supplier=new Chart($('#cSupplier'),{type:'doughnut',
    data:{labels:ch.bySupplier.map(b=>b.supplier),datasets:[{data:ch.bySupplier.map(b=>b.value),backgroundColor:PALETTE,borderColor:'#fff',borderWidth:2,hoverOffset:8}]},
    options:{cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#475569'}}},
      onClick:(e,els)=>{ if(els.length) chartDrill('supplier_sales',ch.bySupplier[els[0].index].supplier,'Supplier · '+ch.bySupplier[els[0].index].supplier); }}});
  // 7. Stock by branch — stacked bar → branch drill
  if($('#cStockBranch')){
    const sb=ch.stockByBranch;
    charts.stockBranch=new Chart($('#cStockBranch'),{type:'bar',
      data:{labels:sb.labels,datasets:sb.series.map((s,i)=>({label:s.name,data:s.data,backgroundColor:PALETTE[i%PALETTE.length],borderRadius:4}))},
      options:{plugins:{legend:{position:'top',labels:{color:'#475569',boxWidth:12}}},
        scales:{x:{stacked:true,grid:{display:false},ticks:tick,border:{display:false}},y:{stacked:true,grid,ticks:tick,border:{display:false},beginAtZero:true}},
        onClick:(e,els)=>{ if(els.length) branchDrill(sb.labels[els[0].index]); }}});
  }
  // 8. Inventory value by branch — treemap (fallback bar) → branch drill
  if($('#cInvVal')) renderInvValue(ch.inventoryValueByBranch);
  // 9. Stock aging — bar → aging drill
  if($('#cAging')) charts.aging=new Chart($('#cAging'),{type:'bar',
    data:{labels:ch.stockAging.map(a=>a.bucket),datasets:[{data:ch.stockAging.map(a=>a.value),backgroundColor:['#16a34a','#84cc16','#f59e0b','#ef4444'],borderRadius:8,maxBarThickness:60}]},
    options:{...noLeg,...xy('x'),onClick:(e,els)=>{ if(els.length) chartDrill('aging',ch.stockAging[els[0].index].bucket,'Stock Aging · '+ch.stockAging[els[0].index].bucket); }}});
  // 10. Monthly profit trend — line → month drill
  if($('#cProfit')){
    const ctx=$('#cProfit').getContext('2d'); const g=ctx.createLinearGradient(0,0,0,240);
    g.addColorStop(0,'rgba(22,163,74,.30)'); g.addColorStop(1,'rgba(22,163,74,0)');
    charts.profit=new Chart($('#cProfit'),{type:'line',
      data:{labels:ch.profitTrend.map(m=>m.month),datasets:[{data:ch.profitTrend.map(m=>m.profit),borderColor:'#16a34a',backgroundColor:g,fill:true,tension:.4,borderWidth:2.5,pointRadius:0,pointHoverRadius:5}]},
      options:{...noLeg,...xy('x'),onClick:(e,els)=>{ if(els.length) chartDrill('month',ch.profitTrend[els[0].index].month,'Profit · '+ch.profitTrend[els[0].index].month); }}});
  }
  // 11. Branch performance — radar → perf table
  if($('#cPerf')){
    const bp=ch.branchPerformance;
    charts.perf=new Chart($('#cPerf'),{type:'radar',
      data:{labels:bp.axes,datasets:bp.series.map((s,i)=>({label:s.branch,data:s.values,
        borderColor:PALETTE[i%PALETTE.length],backgroundColor:PALETTE[i%PALETTE.length]+'33',borderWidth:2,pointRadius:2}))},
      options:{plugins:{legend:{position:'top',labels:{color:'#475569',boxWidth:12}}},
        scales:{r:{suggestedMin:0,suggestedMax:100,ticks:{display:false},grid:{color:'rgba(15,23,42,.08)'}}},
        onClick:()=>openTableModal('Branch Performance', bp.series.map(s=>s.raw))}});
  }
  // 12. Sales executive performance — horizontal bar → staff drill
  if($('#cStaff')) charts.staff=new Chart($('#cStaff'),{type:'bar',
    data:{labels:ch.staffPerformance.map(s=>s.staff),datasets:[{data:ch.staffPerformance.map(s=>s.sales),backgroundColor:'#7c3aed',borderRadius:6,maxBarThickness:30}]},
    options:{indexAxis:'y',...noLeg,...xy('y'),onClick:(e,els)=>{ if(els.length) chartDrill('staff',ch.staffPerformance[els[0].index].staff,'Staff · '+ch.staffPerformance[els[0].index].staff); }}});

  $('#recent').innerHTML = recent.length ? tableHTML(
    ['Date','Branch','Part','Qty','Value','Invoice'],
    recent.map(s=>[fmtDate(s.sale_date),s.branch,esc(s.part_name),s.qty,fmtINR(s.sale_value),esc(s.invoice_no||'—')]))
    : '<p class="muted">No sales yet.</p>';
}

function renderTopChart(){
  if(!$('#cTop')||!_dash) return;
  if(charts.top) charts.top.destroy();
  const grid={color:'rgba(15,23,42,.06)'}, tick={color:'#94a3b8'};
  const tp=_dash.charts.topParts;
  charts.top=new Chart($('#cTop'),{type:'bar',
    data:{labels:tp.map(p=>p.part),datasets:[{data:tp.map(p=>_topMetric==='qty'?p.qty:p.value),backgroundColor:'#2563eb',borderRadius:6,maxBarThickness:26}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{grid,ticks:tick,border:{display:false},beginAtZero:true},y:{grid:{display:false},ticks:tick,border:{display:false}}},
      onClick:(e,els)=>{ if(els.length){ const p=tp[els[0].index]; chartDrill('top_part',p.part,'Part · '+p.part,{pno:p.pno}); } }}});
}

function renderInvValue(data){
  if(!data.length){ return; }
  let ok=false;
  try{
    if(Chart.registry.getController('treemap')){
      charts.invVal=new Chart($('#cInvVal'),{type:'treemap',
        data:{datasets:[{tree:data,key:'value',groups:['branch'],spacing:1,borderWidth:0,
          backgroundColor:c=>c.type==='data'?PALETTE[c.dataIndex%PALETTE.length]:'transparent',
          labels:{display:true,color:'#fff',font:{weight:'600'},formatter:c=>[c.raw._data.branch, fmtINR(c.raw.v)]}}]},
        options:{plugins:{legend:{display:false}},onClick:(e,els)=>{ if(els.length) branchDrill(data[els[0].index].branch); }}});
      ok=true;
    }
  }catch(e){ ok=false; }
  if(!ok){ // fallback: horizontal bar
    const grid={color:'rgba(15,23,42,.06)'}, tick={color:'#94a3b8'};
    charts.invVal=new Chart($('#cInvVal'),{type:'bar',
      data:{labels:data.map(d=>d.branch),datasets:[{data:data.map(d=>d.value),backgroundColor:PALETTE,borderRadius:8,maxBarThickness:34}]},
      options:{indexAxis:'y',plugins:{legend:{display:false}},
        scales:{x:{grid,ticks:tick,border:{display:false},beginAtZero:true},y:{grid:{display:false},ticks:tick,border:{display:false}}},
        onClick:(e,els)=>{ if(els.length) branchDrill(data[els[0].index].branch); }}});
  }
}

function renderAlerts(a){
  if(!a) return '';
  const items=[];
  if(a.outOfStock.count) items.push(['red','❌',a.outOfStock.count,'Out of Stock','out_of_stock']);
  if(a.lowStock.count)   items.push(['amber','⚠️',a.lowStock.count,'Low Stock','low_stock']);
  if(a.deadStock.count)  items.push(['blue','🐢',a.deadStock.count,'Dead Stock','dead_stock']);
  if(a.spikes.count)     items.push(['green','🚀',a.spikes.count,'Sales Spikes','__spikes']);
  if(!items.length) return `<div class="alert green"><span>✅</span><span>All healthy — no active alerts</span></div>`;
  return items.map(([cls,ic,nn,lbl,type])=> type==='__spikes'
    ? `<div class="alert ${cls}" onclick="openTableModal('Sales Spikes', _dash.alerts.spikes.sample)"><span>${ic}</span><span class="n">${nn}</span><span>${lbl}</span></div>`
    : `<div class="alert ${cls}" onclick="drill('${type}','${lbl}')"><span>${ic}</span><span class="n">${nn}</span><span>${lbl}</span></div>`
  ).join('');
}

// ── Drill-downs ──────────────────────────────────────────────────────────────
async function drill(type,label){ return chartDrill(type,null,label); }
async function chartDrill(type,key,label,extra){
  const r=await apiCall('GET','/dashboard/drill/'+type+dashQS({key, ...(extra||{})}));
  openTableModal(label, r.ok? r.data: []);
}
function trendDrill(label){
  let from=label,to=label;
  if(_gran==='month'){ from=label+'-01'; const d=new Date(label+'-01T00:00:00'); d.setMonth(d.getMonth()+1); d.setDate(0); to=d.toISOString().slice(0,10); }
  else if(_gran==='week'){ const d=new Date(label+'T00:00:00'); d.setDate(d.getDate()+6); to=d.toISOString().slice(0,10); }
  else if(_gran==='year'){ from=label+'-01-01'; to=label+'-12-31'; }
  apiCall('GET','/dashboard/drill/total_sales'+dashQS({from,to})).then(r=>openTableModal('Sales · '+label, r.ok?r.data:[]));
}

// Branch drill-down: Sales / Stock / Staff / Products tabs.
let _bdBranch=null;
function branchDrill(branch){
  _bdBranch=branch;
  modal('Branch · '+branch, `<div class="tabs" id="bdTabs">
    <button class="active" onclick="bdTab('sales',this)">Sales</button>
    <button onclick="bdTab('stock',this)">Stock</button>
    <button onclick="bdTab('staff',this)">Staff</button>
    <button onclick="bdTab('products',this)">Products</button></div>
    <div id="bdBody"><p class="muted">Loading…</p></div>`);
  bdTab('sales',$('#bdTabs').firstElementChild);
}
async function bdTab(key,btn){

const prettyCol = c => c.replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());
function fmtCell(col,val){
  if(val==null) return '—';
  if(/value|price|profit|cost|sales/.test(col)) return fmtINR(val);
  if(/date|last_sale/.test(col)) return fmtDate(val);
  return esc(val);
}

// ── Reusable table modal + Excel/PDF/CSV export ──────────────────────────────
let _exports={}, _expSeq=0;
function exportBar(headers, rows, baseName){
  const id='x'+(++_expSeq); _exports[id]={headers,rows,baseName};
  return expMenu('doExport',id);
}
function expMenu(fn,...args){
  const a=args.map(x=>`'${String(x).replace(/'/g,"\\'")}'`).join(',');
  const pre=a?a+',':'';
  return `<details class="exp"><summary>⬇ Export</summary><div class="exp-menu">
    <button onclick="${fn}(${pre}'xlsx')">Excel (.xlsx)</button>
    <button onclick="${fn}(${pre}'pdf')">PDF (.pdf)</button>
    <button onclick="${fn}(${pre}'csv')">CSV (.csv)</button></div></details>`;
}
function doExport(id,fmt){
  const e=_exports[id]; if(!e) return;
  runExport(fmt, e.baseName, e.headers, e.rows);
  document.querySelectorAll('details.exp[open]').forEach(d=>d.open=false);
}
function runExport(fmt, baseName, headers, rows){
  if(fmt==='xlsx') exportExcel(baseName,headers,rows);
  else if(fmt==='pdf') exportPDF(baseName,headers,rows);
  else exportCSV2(baseName,headers,rows);
}
const _stamp=()=>new Date().toISOString().slice(0,10);
function exportExcel(baseName,headers,rows){
  if(typeof XLSX==='undefined') return toast('Excel library not loaded','err');
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows.map(r=>r.map(c=>c==null?'':c))]);
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb, baseName+'_'+_stamp()+'.xlsx');
}
function exportPDF(baseName,headers,rows){
  if(!(window.jspdf&&window.jspdf.jsPDF)) return toast('PDF library not loaded','err');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:headers.length>6?'landscape':'portrait',unit:'pt',format:'a4'});
  doc.setFontSize(13); doc.text(baseName.replace(/_/g,' '),40,34);
  if(typeof doc.autoTable!=='function') return toast('PDF table plugin not loaded','err');
  doc.autoTable({head:[headers],body:rows.map(r=>r.map(c=>c==null?'':String(c))),startY:46,styles:{fontSize:8},headStyles:{fillColor:[37,99,235]}});
  doc.save(baseName+'_'+_stamp()+'.pdf');
}
function exportCSV2(baseName,headers,rows){
  const csv=[headers,...rows].map(r=>r.map(c=>{const v=c==null?'':String(c); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(',')).join('\n');
  const a=el('a',{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:baseName+'_'+_stamp()+'.csv'}); a.click();
}
// Build a table + export bar for an array of row objects (used by drill/branch modals).
function tableModalHTML(rows){
  const cols=Object.keys(rows[0]); const headers=cols.map(prettyCol);
  return `<div class="barRow"><div class="muted">${rows.length} rows</div>${exportBar(headers, rows.map(r=>cols.map(c=>r[c])), 'export')}</div>
    <div class="tableWrap">${tableHTML(headers, rows.map(r=>cols.map(c=>fmtCell(c,r[c]))))}</div>`;
}
function openTableModal(title, rows){
  if(!rows||!rows.length) return modal(title,'<p class="muted">No records.</p>');
  modal(title+' · '+rows.length+' rows', tableModalHTML(rows));
}
function exportDashSummary(fmt){
  if(!_dash) return toast('Load the dashboard first','err');
  const headers=['Metric','Value'];
  const rows=KPI_DEFS.concat(SECONDARY_KPIS.map(([k,l,f])=>({k,l,f}))).map(d=>[d.l, _dash.kpis[d.k]]);
  runExport(fmt,'dashboard_summary',headers,rows);
}

// ── Multi-part cart ──
function addSaleItem(){
  if(!_salePart) return toast('Select a part first','err');
  const qty=+$('#sQty').value||0, price=+$('#sPrice').value||0;
  if(qty<1) return toast('Enter a quantity','err');
  const avail=+$('#sAvail').value||0;
  const ex=_saleItems.find(it=>it.partName===_salePart.part_name&&it.partNo===_salePart.part_no);
  const already=ex?ex.qty:0;
  if(qty+already>avail) return toast('Insufficient stock. Available '+avail+(already?', already added '+already:''),'err');
  if(ex){ ex.qty+=qty; ex.unitPrice=price; ex.saleValue=ex.qty*price; }      // same part → merge qty
  else _saleItems.push({ vehicle:_salePart.vehicle, partName:_salePart.part_name, partNo:_salePart.part_no, qty, unitPrice:price, saleValue:qty*price });
  renderSaleItems(); updateInvoicePreview();
  $('#sPart').value=''; $('#sQty').value=1; $('#sPrice').value=''; $('#sAvail').value=''; $('#sVal').value=''; _salePart=null;
}
function removeSaleItem(i){ _saleItems.splice(i,1); renderSaleItems(); updateInvoicePreview(); }
function renderSaleItems(){
  const box=$('#saleItems'); if(!box) return;
  if(!_saleItems.length){ box.innerHTML='<p class="muted" style="margin:8px 0">No items yet — pick a part and click <b>+ Add item</b>. You can add several parts to one invoice.</p>'; return; }
  const total=_saleItems.reduce((t,it)=>t+it.saleValue,0);

    customerName:$('#sCust').value.trim()||undefined,

    <div>Customer: ${esc(s.customer_name||'—')}</div>
    <div style="display:flex;justify-content:space-between"><span>${s.chassis_no?('Chassis No: '+esc(s.chassis_no)):('Vehicle No: '+esc(s.vehicle_no||'—'))}</span><span>${esc(s.vehicle||'—')}</span></div>
    <table style="width:100%;margin-top:8px;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#2563eb;color:#fff"><th style="text-align:left;padding:4px 6px">Item</th><th style="padding:4px 6px">Qty</th><th style="padding:4px 6px;text-align:right">Rate</th><th style="padding:4px 6px;text-align:right">Amount</th></tr></thead>
      <tbody>${items.map(it=>`<tr><td style="padding:4px 6px">${esc(it.part_name||'—')}${it.part_no&&it.part_no!=='—'?'<br><span style="color:#94a3b8">'+esc(it.part_no)+'</span>':''}</td><td style="text-align:center">${it.qty||0}</td><td style="text-align:right">${rs(it.unit_price)}</td><td style="text-align:right">${rs(it.sale_value)}</td></tr>`).join('')}</tbody>
    </table>
    <div style="margin-top:8px;margin-left:38%">
      ${row('Subtotal', rs(taxable))}

      ${row('Total', rs(total), true)}

    <div style="text-align:center;color:#64748b;margin-top:10px;font-size:11px">Thank you for your business!</div>
  </div>`;
}

  const ext=(f.name.split('.').pop()||'').toLowerCase();

function readExcel(f){

  const rd=new FileReader();

    const ws=wb.Sheets[wb.SheetNames[0]];

    $('#bText').value=aoa.map(r=>r.map(csvCell).join(',')).join('\n');

  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else if(ch==='"') inQ=true;
    else if(ch===','){ row.push(cur); cur=''; }
    else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else if(ch!=='\r') cur+=ch;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  if(rows.length<2) return [];
  const head=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(c=>String(c).trim()!==''))
    .map(r=>{ const o={}; head.forEach((h,i)=>o[h]=(r[i]!=null?String(r[i]).trim():'')); return o; });
}
function previewBulk(){
  const rows=parseCSV($('#bText').value);
  if(!rows.length){ $('#bPreview').innerHTML='<p class="muted">Nothing to preview.</p>'; $('#bSubmit').classList.add('hidden'); return; }
  _bulkRows=rows.map(r=>({partName:r.partName,qty:cleanNum(r.qty),vehicle:r.vehicle,partNo:r.partNo,
    unitCost:optNum(r.unitPrice),sellingPrice:optNum(r.sellingPrice),
    supplier:r.supplier,batchNo:r.batchNo}));
  // Flag duplicate rows WITHIN the file (same part, qty, supplier, batch).
  const seen={}, dupFlag=[];
  _bulkRows.forEach((r,idx)=>{
    const sig=[String(r.partName||'').trim().toLowerCase(),(r.partNo||'—'),r.qty,String(r.supplier||'').trim().toLowerCase(),String(r.batchNo||'').trim().toLowerCase()].join('|');
    dupFlag[idx]=!!seen[sig]; seen[sig]=true;
  });
  const dupCount=dupFlag.filter(Boolean).length;
  const bad=_bulkRows.filter(r=>!validBulkRow(r)).length;
  const qVal=r=>Number.isFinite(r.qty)?r.qty:'<span class="pill red">—</span>';
  const status=(r,idx)=> !validBulkRow(r) ? '<span class="pill red">invalid</span>'
    : (dupFlag[idx]?'<span class="pill amber">duplicate</span>':'<span class="pill green">new</span>');
  $('#bPreview').innerHTML=
    `<p>${_bulkRows.length} rows · ${bad?('<span class="pill red">'+bad+' invalid (won’t upload)</span> · '):''}`
    +`${dupCount?('<span class="pill amber">'+dupCount+' duplicate row'+(dupCount>1?'s':'')+' in file</span>'):'<span class="pill green">no in-file duplicates</span>'}</p>`
    +`${bad?'<p class="muted" style="margin:4px 0">Invalid rows are missing a part name or a valid quantity — fix them in your file and re-preview, or they will be skipped.</p>':''}`
    +`${dupCount?'<p class="muted" style="margin:4px 0">Highlighted rows repeat earlier rows. Duplicates already in the system are also detected on upload and skipped unless you choose to include them.</p>':''}`
    +`<div class="tableWrap">${tableHTML(['#','Part','Vehicle','Part No','Qty','Unit Price','Selling Price','Supplier','Status'],
      _bulkRows.map((r,idx)=>[idx+1,r.partName||'<span class="pill red">missing</span>',r.vehicle||'—',r.partNo||'—',qVal(r),r.unitCost??'—',r.sellingPrice??'—',r.supplier||'—',
        status(r,idx)]))}</div>`;
  $('#bSubmit').classList.remove('hidden');
}

async function submitBulk(btn){
  if(!_bulkRows.length) return toast('Preview first','err');
  const rows=_bulkRows.map(r=>({...r,branch:curBranch(),inwardDate:$('#bDate').value}));
  btn.disabled=true; const r=await apiCall('POST','/inward/bulk',{rows,force:false}); btn.disabled=false;

  if(r.vpmap) VPMAP=r.vpmap;
  loadInwardHistory();

  if(dups.length){
    toast(`${r.data.saved} uploaded · ${dups.length} duplicate${dups.length>1?'s':''} skipped`,'err');
    $('#bPreview').innerHTML=`<div class="card" style="border-left:4px solid var(--amber)">
      <h3 style="margin:0 0 8px">⚠ ${dups.length} duplicate row${dups.length>1?'s':''} skipped</h3>

      <div class="tableWrap">${tableHTML(['File Row','Part','Part No','Qty','Branch','Date'],dups.map(d=>[d.row,esc(d.partName),esc(d.partNo),d.qty,esc(d.branch),fmtDate(d.date)]))}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="danger" onclick="forceBulk(this)">Upload duplicates anyway</button>
        <button class="ghost" onclick="resetBulk()">Done</button>
      </div></div>`;
    return;
  }
  toast(`Uploaded ${r.data.saved} row${r.data.saved===1?'':'s'}`+(r.data.errors.length?`, ${r.data.errors.length} skipped`:''));
  resetBulk();
}
async function forceBulk(btn){
  if(!_lastDups.length) return resetBulk();
  const rows=_lastDups.map(d=>({..._bulkRows[d.row-1],branch:curBranch(),inwardDate:$('#bDate').value}));
  btn.disabled=true; const r=await apiCall('POST','/inward/bulk',{rows,force:true}); btn.disabled=false;
  if(!r.ok) return toast(r.msg||'Failed','err');
  if(r.vpmap) VPMAP=r.vpmap;

}

function addTransferItem(){
  if(!curFrom()) return toast('Select the source branch first','err');
  if(!_transferPart) return toast('Select a part first','err');
  const qty=+$('#tQty').value||0;
  if(qty<1) return toast('Enter a quantity','err');
  const avail=+$('#tAvail').value||0;
  const ex=_transferItems.find(it=>it.partName===_transferPart.part_name&&it.partNo===_transferPart.part_no);
  const already=ex?ex.qty:0;
  if(qty+already>avail) return toast('Insufficient stock. Available '+avail+(already?', already added '+already:''),'err');
  if(ex) ex.qty+=qty;
  else _transferItems.push({ vehicle:_transferPart.vehicle, partName:_transferPart.part_name, partNo:_transferPart.part_no, qty });
  renderTransferItems();
  $('#tPart').value=''; $('#tQty').value=1; $('#tAvail').value=''; _transferPart=null;
}

      <button class="ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function confirmDeleteSupplier(id,btn){
  btn.disabled=true; const r=await apiCall('DELETE','/suppliers/'+encodeURIComponent(id)); btn.disabled=false;
  if(!r.ok) return toast(r.msg||'Failed','err');
  const f=r.data&&r.data.refs; const note=f&&(f.stock||f.inward)?` (kept: ${f.stock} parts, ${f.inward} inward)`:'';
  toast('Supplier deleted'+note); closeModal(); await refreshSuppliers(); loadSuppliers();
}

/* ════════════════════ Users ════════════════════ */
const ROLES=['Admin','Branch_Manager','Sales_Staff','Store_Staff','Accountant'];
async function viewUsers(){
  const m=$('#main');
  m.innerHTML=`<h1>Users</h1><p class="sub">Manage staff accounts.</p>
    <button class="ok" onclick="openAddUser()">+ Add User</button>
    <div id="usrTbl" style="margin-top:14px"></div>`;
  loadUsers();
}
let _userCache=[];
async function loadUsers(){
  const r=await apiCall('GET','/users');
  if(!r.ok) return toast(r.msg,'err'); _userCache=r.data;
  $('#usrTbl').innerHTML=`<div class="tableWrap">${tableHTML(
    ['ID','Name','Email','Role','Branch','Status','Last Login',''],
    r.data.map(u=>[u.id,u.name,u.email,u.role.replace(/_/g,' '),u.branch||'—',
      u.status==='Active'?'<span class="pill green">Active</span>':'<span class="pill gray">Inactive</span>',
      fmtDate(u.last_login)||'—',`<button class="sm ghost" onclick="editUser('${u.id}')">Edit</button> <button class="sm danger" onclick="deleteUser('${u.id}')">Delete</button>`]))}</div>`;
}
function openAddUser(){
  modal('Add User',`
    <div class="row"><div class="field"><label>Name</label><input id="uName"></div>
      <div class="field"><label>Email</label><input id="uEmail" type="email"></div></div>
    <div class="row"><div class="field"><label>Role</label><select id="uRole">${ROLES.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Branch</label><select id="uBranch"><option value="ALL">ALL</option>${branchOptions(false)}</select></div></div>
    <div class="field"><label>Password</label><input id="uPwd" type="text" placeholder="min 6 chars"></div>
    <button onclick="submitUser(this)">Create User</button>`);
}
async function submitUser(btn){
  const body={name:$('#uName').value.trim(),email:$('#uEmail').value.trim(),role:$('#uRole').value,
    branch:$('#uBranch').value,password:$('#uPwd').value};
  if(!body.name||!body.email||!body.password) return toast('Name, email, password required','err');
  btn.disabled=true; const r=await apiCall('POST','/users',body); btn.disabled=false;
  if(!r.ok) return toast(r.msg||'Failed','err'); toast('User created · '+r.data.id); closeModal(); loadUsers();
}
function editUser(id){
  const u=_userCache.find(x=>x.id===id); if(!u) return;
  const branchOpts=['ALL',...BRANCHES.map(b=>b.name)];
  if(u.branch && !branchOpts.includes(u.branch)) branchOpts.unshift(u.branch);
  modal('Edit User',`
    <div class="row"><div class="field"><label>Name</label><input id="euName" value="${esc(u.name)}"></div>
      <div class="field"><label>Email (not editable — login id)</label><input value="${esc(u.email)}" disabled></div></div>
    <div class="row"><div class="field"><label>Role</label><select id="euRole">${ROLES.map(rr=>`<option ${rr===u.role?'selected':''}>${rr}</option>`).join('')}</select></div>
      <div class="field"><label>Branch</label><select id="euBranch">${branchOpts.map(o=>`<option ${o===u.branch?'selected':''}>${esc(o)}</option>`).join('')}</select></div></div>
    <div class="row"><div class="field"><label>Status</label><select id="euStatus">
        <option ${u.status==='Active'?'selected':''}>Active</option>
        <option ${u.status==='Inactive'?'selected':''}>Inactive</option></select></div>
      <div class="field"><label>New Password (optional)</label><input id="euPwd" type="text" placeholder="leave blank to keep"></div></div>
    <button onclick="submitEditUser('${u.id}',this)">Save Changes</button>`);
}
async function submitEditUser(id,btn){
  const body={name:$('#euName').value.trim(),role:$('#euRole').value,branch:$('#euBranch').value,status:$('#euStatus').value};
  const pwd=$('#euPwd').value; if(pwd) body.password=pwd;
  btn.disabled=true; const r=await apiCall('PUT','/users/'+id,body); btn.disabled=false;
  if(!r.ok) return toast(r.msg||'Failed','err'); toast('User updated'); closeModal(); loadUsers();
}
function deleteUser(id){
  const u=_userCache.find(x=>x.id===id); if(!u) return;
  if(id===USER.userId) return toast('You cannot delete your own account','err');
  modal('Delete User',`
    <p>Delete user <b>${esc(u.name)}</b> <span class="muted">(${esc(u.email)})</span>?</p>
    <p class="muted">Past sales/inward rows recorded by this user are kept (their email stays on those records).</p>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="danger" onclick="confirmDeleteUser('${esc(u.id)}',this)">Delete user</button>
      <button class="ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function confirmDeleteUser(id,btn){
  btn.disabled=true; const r=await apiCall('DELETE','/users/'+encodeURIComponent(id)); btn.disabled=false;
  if(!r.ok) return toast(r.msg||'Failed','err'); toast('User deleted'); closeModal(); loadUsers();
}

/* ════════════════════ Settings ════════════════════ */
async function viewSettings(){
  const m=$('#main');
  m.innerHTML=`<h1>Settings</h1><p class="sub">Application configuration.</p><div id="gstBox"></div><div id="setBody"></div>`;
  const r=await apiCall('GET','/settings');
  if(!r.ok) return toast(r.msg,'err');
  renderGstToggle(r.data);
  $('#setBody').innerHTML=`<div class="card" style="max-width:640px"><h3 style="margin:0 0 12px;font-size:14px">All settings</h3>`+r.data.map(s=>`
    <div class="field"><label>${esc(s.key)} <span class="muted">— ${esc(s.description||'')}</span></label>
      <div style="display:flex;gap:8px"><input id="set_${esc(s.key)}" value="${esc(s.value)}">
      <button class="sm" onclick="saveSetting('${esc(s.key)}')">Save</button></div></div>`).join('')+`</div>`;
}
function renderGstToggle(rows){
  const row=(rows||[]).find(s=>s.key==='GST_ENABLED');
  const on = !row || String(row.value)!=='false';
  CONFIG.gstEnabled = on;
  const box=$('#gstBox'); if(!box) return;
  box.innerHTML=`<div class="card" style="max-width:640px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div><div style="font-weight:700">GST on invoices <span class="pill ${on?'green':'gray'}">${on?'Active':'Inactive'}</span></div>
      <div class="muted" style="font-size:12px;margin-top:4px">${on?'GST is applied on invoices &amp; PDFs using the GST_RATE below.':'Invoices show no GST (subtotal = total).'}</div></div>
    <button class="${on?'danger':'ok'}" type="button" onclick="toggleGST(${on})">${on?'Deactivate GST':'Activate GST'}</button>
  </div>`;
}
async function toggleGST(currentlyOn){
  const r=await apiCall('PUT','/settings/GST_ENABLED',{value: currentlyOn?'false':'true'});
  if(!r.ok) return toast(r.msg||'Failed','err');
  CONFIG.gstEnabled=!currentlyOn;
  toast('GST '+(currentlyOn?'deactivated':'activated'));
  const s=await apiCall('GET','/settings'); if(s.ok) renderGstToggle(s.data);
}
async function saveSetting(key){
  const r=await apiCall('PUT','/settings/'+encodeURIComponent(key),{value:$('#set_'+key).value});
  if(!r.ok) return toast(r.msg,'err'); toast(key+' updated');
}

/* ════════════════════ Shared UI ════════════════════ */
function tableHTML(headers, rows){
  return `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c==null?'—':c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function modal(title, html){
  closeModal();
  const o=el('div',{className:'overlay',id:'modalOverlay'});
  o.innerHTML=`<div class="modal"><div class="modalHead"><h3>${esc(title)}</h3>
    <button class="ghost sm" onclick="closeModal()">✕</button></div>${html}</div>`;
  o.onclick=e=>{ if(e.target===o) closeModal(); };
  document.body.appendChild(o);
}
function closeModal(){ const o=$('#modalOverlay'); if(o) o.remove(); }

/* ════════════════════ PDF invoice ════════════════════ */
function printInvoice(id){ const s=_salesCache.find(x=>x.id===id); if(s) generateInvoicePDF(s); else toast('Sale not found','err'); }
function generateInvoicePDF(s){
  if(!(window.jspdf&&window.jspdf.jsPDF)) return toast('PDF library not loaded — check your connection','err');
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a5'});
  const W=doc.internal.pageSize.getWidth();
  const L=40, R=W-40; let y=44;
  const rs=n=>'Rs. '+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
  // ── header ──
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text(CONFIG.company||COMPANY, W/2, y, {align:'center'}); y+=14;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90);
  doc.text((s.branch||'')+' Branch', W/2, y, {align:'center'}); y+=11;
  if(CONFIG.gstin){ doc.text('GSTIN: '+CONFIG.gstin, W/2, y, {align:'center'}); y+=11; }
  y+=5; doc.setDrawColor(37,99,235); doc.setLineWidth(1); doc.line(L,y,R,y); y+=16;
  doc.setTextColor(20); doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('INVOICE', W/2, y, {align:'center'}); y+=20;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('Invoice No: '+(s.invoice_no||'-'), L, y);
  doc.text('Date: '+fmtDate(s.sale_date), R, y, {align:'right'}); y+=14;
  doc.text('Customer: '+(s.customer_name||'-'), L, y); y+=13;
  doc.text((s.chassis_no?('Chassis No: '+s.chassis_no):('Vehicle No: '+(s.vehicle_no||'-'))), L, y);
  doc.text('Model: '+(s.vehicle||'-'), R, y, {align:'right'}); y+=18;
  // ── line item ──
  doc.setFillColor(37,99,235); doc.rect(L,y-11,R-L,16,'F');
  doc.setTextColor(255); doc.setFont('helvetica','bold');
  doc.text('Item', L+4, y); doc.text('Qty', R-150, y, {align:'right'});
  doc.text('Rate', R-80, y, {align:'right'}); doc.text('Amount', R-4, y, {align:'right'}); y+=18;
  doc.setTextColor(20); doc.setFont('helvetica','normal');
  const items=(s.items&&s.items.length)?s.items:[{part_name:s.part_name,part_no:s.part_no,qty:s.qty,unit_price:s.unit_price,sale_value:s.sale_value}];
  for(const it of items){
    const item=(it.part_name||'')+(it.part_no&&it.part_no!=='—'?' ('+it.part_no+')':'');
    doc.text(doc.splitTextToSize(item, R-L-170)[0], L+4, y);
    doc.text(String(it.qty), R-150, y, {align:'right'});
    doc.text(rs(it.unit_price), R-80, y, {align:'right'});
    doc.text(rs(it.sale_value), R-4, y, {align:'right'}); y+=14;
  }
  y-=6; doc.setDrawColor(200); doc.line(L,y,R,y); y+=15;
  // ── totals (+GST) ──
  const rate=(CONFIG.gstEnabled===false?0:(Number(CONFIG.gstRate)||0));
  let taxable=Number(s.sale_value||0), gst=0, total=taxable;
  if(rate>0){
    if((CONFIG.gstMode||'exclusive')==='inclusive'){ taxable=total/(1+rate/100); gst=total-taxable; }
    else { gst=taxable*rate/100; total=taxable+gst; }
  }
  doc.setFont('helvetica','normal');
  doc.text('Subtotal', R-95, y, {align:'right'}); doc.text(rs(taxable), R-4, y, {align:'right'}); y+=13;
  if(rate>0){
    doc.text('CGST ('+(rate/2)+'%)', R-95, y, {align:'right'}); doc.text(rs(gst/2), R-4, y, {align:'right'}); y+=13;
    doc.text('SGST ('+(rate/2)+'%)', R-95, y, {align:'right'}); doc.text(rs(gst/2), R-4, y, {align:'right'}); y+=13;
  }
  y+=2; doc.setDrawColor(200); doc.line(R-150,y,R,y); y+=15;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Total', R-95, y, {align:'right'}); doc.text(rs(total), R-4, y, {align:'right'}); y+=28;
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(110);
  doc.text('Served by: '+(s.staff_email||''), L, y); y+=18;
  doc.setFontSize(9); doc.setTextColor(20);
  doc.text('Thank you for your business!', W/2, y, {align:'center'});
  doc.save('Invoice_'+(s.invoice_no||s.id)+'.pdf');
}

// Export a live list cache (sales / stock) as Excel / PDF / CSV.
function doListExport(kind, fmt){
  const data = kind==='sales'?_salesCache:_stockCache;
  if(!data||!data.length) return toast('Nothing to export','err');
  const cols=Object.keys(data[0]);
  runExport(fmt, kind, cols.map(prettyCol), data.map(r=>cols.map(c=>r[c])));
  document.querySelectorAll('details.exp[open]').forEach(d=>d.open=false);
}
