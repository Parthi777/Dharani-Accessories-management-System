# Single-command deployment: `docker compose up -d --build`
# Brings up PostgreSQL + the DAMS app together. Data persists in the dams_db volume.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: dams
    volumes:
      - dams_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dams"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/dams
      PGSSL: disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in a .env file or your shell before deploying}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${PORT:-3000}:3000"

volumes:
  dams_db:
